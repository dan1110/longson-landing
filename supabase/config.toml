# Cấu hình Supabase CLI cho môi trường local.
# Xem: https://supabase.com/docs/guides/cli/config
project_id = "long-son-homestay"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = false          # chỉ owner/manager, tạo tay — không cho tự đăng ký
enable_confirmations = false

[auth.email]
enable_signup = false

[realtime]
enabled = true

[storage]
enabled = true
# Bucket 'receipts' cho ảnh hóa đơn — tạo bằng migration/tay trên dashboard.

[edge_runtime]
enabled = true
